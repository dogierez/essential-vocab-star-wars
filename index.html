<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galactic Vocabulary Archives</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap');

        body {
            background-color: #050505;
            background-image: radial-gradient(circle at center, #151515 0%, #000000 100%);
            color: #fff;
            /* Main reading font is Arial for maximum readability */
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        .menu-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            width: 100%;
            max-width: 1300px;
            padding: 20px;
        }

        .main-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 52px;
            letter-spacing: 6px;
            color: #ffe81f; /* Star Wars Gold */
            text-shadow: 0 0 15px rgba(255, 232, 31, 0.7);
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        
        /* 10 Distinct Neon Colors */
        .color-1 { color: #ffa500; border-color: #ffa500; text-shadow: 0 0 8px #ffa500; } /* Orange */
        .color-2 { color: #00bfff; border-color: #00bfff; text-shadow: 0 0 8px #00bfff; } /* Sky Blue */
        .color-3 { color: #ffffff; border-color: #ffffff; text-shadow: 0 0 8px #ffffff; } /* White */
        .color-4 { color: #bc13fe; border-color: #bc13fe; text-shadow: 0 0 8px #bc13fe; } /* Purple */
        .color-5 { color: #1e90ff; border-color: #1e90ff; text-shadow: 0 0 8px #1e90ff; } /* Dodger Blue */
        .color-6 { color: #ff0000; border-color: #ff0000; text-shadow: 0 0 8px #ff0000; } /* Red */
        .color-7 { color: #ff69b4; border-color: #ff69b4; text-shadow: 0 0 8px #ff69b4; } /* Hot Pink */
        .color-8 { color: #ffff00; border-color: #ffff00; text-shadow: 0 0 8px #ffff00; } /* Yellow */
        .color-9 { color: #00ffff; border-color: #00ffff; text-shadow: 0 0 8px #00ffff; } /* Cyan */
        .color-10 { color: #39ff14; border-color: #39ff14; text-shadow: 0 0 8px #39ff14; } /* Neon Green */

        #rank-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            justify-content: center;
            width: 100%;
        }

        .rank-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .rank-btn {
            background: rgba(0, 0, 0, 0.7);
            border-width: 4px;
            border-style: solid;
            border-radius: 15px;
            width: 100%;
            height: 160px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
        }

        .rank-btn:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.05);
        }

        .btn-theme {
            font-size: 28px;
            font-weight: 900;
            display: block;
            margin-bottom: 5px;
        }

        .btn-character {
            font-size: 13px;
            font-weight: bold;
            opacity: 0.8;
            letter-spacing: 1px;
        }

        .progress-text {
            color: #666;
            font-size: 13px;
            font-family: monospace;
        }

        .back-btn {
            background: transparent;
            border: 2px solid #555;
            color: #888;
            padding: 12px 35px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
            border-radius: 5px;
        }
        .back-btn:hover { background: #444; color: #fff; }

        /* Flashcard Area */
        #flashcard-area {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
        }

        .hud {
            position: absolute;
            top: 20px;
            font-size: 22px;
            font-family: monospace;
            color: #444;
        }

        #progress-hud { left: 40px; text-align: left; }
        #score-hud { right: 40px; text-align: right; }
        .score-correct { color: #39ff14; }
        .score-failed { color: #ff003c; }

        #sentence-container {
            position: absolute;
            top: 48%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            display: flex;
            flex-direction: column;
            gap: 60px;
        }

        /* Readability Settings */
        .state-def { 
            font-size: 3.8vw; 
            color: #ff8c00; /* Vibrant Orange */
            line-height: 1.3;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        } 
        
        .state-word { 
            font-size: 7vw; 
            color: #39ff14; /* Neon Green */
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(57, 255, 20, 0.5);
        } 

        .controls-hint {
            position: absolute; 
            bottom: 30px; 
            width: 100%; 
            color: #333; 
            font-family: monospace; 
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div id="main-menu" class="menu-container">
        <h1 class="main-title">Archives</h1>
        <div id="rank-grid"></div>
    </div>

    <div id="flashcard-area">
        <div id="progress-hud" class="hud">Module: <span id="hud-set" style="color: #888;"></span><br>Entry <span id="hud-current">0</span> / <span id="hud-total">0</span></div>
        <div id="score-hud" class="hud">Correct: <span id="hud-correct" class="score-correct">0</span><br>Failed: <span id="hud-failed" class="score-failed">0</span></div>
        
        <div id="sentence-container">
            <div id="def-text" class="state-def"></div>
            <div id="word-text" class="state-word" style="visibility: hidden;"></div>
        </div>

        <div class="controls-hint">
            [UP] Reveal | [RIGHT] Correct | [LEFT] Failed | [DOWN] Undo | [ESC] Exit
        </div>
    </div>

    <div id="results-screen" class="menu-container" style="display: none; height: 100vh; justify-content: center;">
        <h1 style="font-size: 60px; color: #ffe81f; margin-bottom: 10px;">MISSION COMPLETE</h1>
        <div style="font-size: 72px; margin-bottom: 20px;">Score: <span id="res-percentage">0</span>%</div>
        <div style="font-size: 38px; margin-bottom: 40px;">
            <span class="score-correct">Correct: <span id="res-correct">0</span></span> | 
            <span class="score-failed">Failed: <span id="res-failed">0</span></span>
        </div>
        <button class="back-btn" onclick="showMainMenu()">Return to Command Center</button>
    </div>

        let currentRank = '', activeDeck = [], currentIndex = 0;
        let isFlipped = false, scoreCorrect = 0, scoreFailed = 0, isActive = false, scoreHistory = [];
        let completedRanks = JSON.parse(localStorage.getItem('sw_def_progress_v2')) || [];

        function initMenu() {
            const grid = document.getElementById('rank-grid');
            grid.innerHTML = '';
            
            ranks.forEach(rank => {
                const isDone = completedRanks.includes(rank.id);
                const total = vocabularyData[rank.id].length;
                
                const container = document.createElement('div');
                container.className = 'rank-container';
                
                const btn = document.createElement('button');
                btn.className = `rank-btn ${rank.color}`;
                if(isDone) btn.style.opacity = "0.4";
                
                btn.innerHTML = `
                    <span class="btn-theme">${rank.theme}</span>
                    <span class="btn-character">${rank.char}</span>
                    ${isDone ? '<span style="font-size: 20px; margin-top: 5px;">✓</span>' : ''}
                `;
                
                btn.onclick = () => startTraining(rank);

                const prog = document.createElement('div');
                prog.className = 'progress-text';
                prog.innerText = isDone ? `CLEARED` : `${total} Entries`;
                
                container.appendChild(btn);
                container.appendChild(prog);
                grid.appendChild(container);
            });
        }

        function hideAll() {
            ['main-menu', 'flashcard-area', 'results-screen'].forEach(id => document.getElementById(id).style.display = 'none');
        }

        function showMainMenu() { hideAll(); initMenu(); document.getElementById('main-menu').style.display = 'flex'; isActive = false; }

        function startTraining(rankObj) {
            currentRank = rankObj;
            activeDeck = [...vocabularyData[rankObj.id]].sort(() => Math.random() - 0.5);
            currentIndex = 0; scoreCorrect = 0; scoreFailed = 0; scoreHistory = []; isActive = true;
            hideAll(); 
            document.getElementById('flashcard-area').style.display = 'block';
            document.getElementById('hud-set').innerText = rankObj.theme;
            document.getElementById('hud-total').innerText = activeDeck.length;
            updateHUD(); displayCard();
        }

        function updateHUD() {
            document.getElementById('hud-current').innerText = currentIndex + 1;
            document.getElementById('hud-correct').innerText = scoreCorrect;
            document.getElementById('hud-failed').innerText = scoreFailed;
        }

        function displayCard() {
            document.getElementById('def-text').innerText = activeDeck[currentIndex].def;
            document.getElementById('word-text').innerText = activeDeck[currentIndex].word;
            document.getElementById('word-text').style.visibility = 'hidden';
            isFlipped = false;
        }

        function flipCard() { if (!isFlipped) { document.getElementById('word-text').style.visibility = 'visible'; isFlipped = true; } }

        function nextCard() {
            currentIndex++;
            if (currentIndex >= activeDeck.length) endExercise(`Victory for the ${currentRank.char}!`);
            else { updateHUD(); displayCard(); }
        }

        function endExercise(msg) {
            isActive = false; hideAll();
            if (currentIndex >= activeDeck.length && !completedRanks.includes(currentRank.id)) {
                completedRanks.push(currentRank.id);
                localStorage.setItem('sw_def_progress_v2', JSON.stringify(completedRanks));
            }
            let total = scoreCorrect + scoreFailed;
            document.getElementById('results-screen').style.display = 'flex';
            document.getElementById('results-message').innerText = msg;
            document.getElementById('res-percentage').innerText = total === 0 ? 0 : Math.round((scoreCorrect / total) * 100);
            document.getElementById('res-correct').innerText = scoreCorrect;
            document.getElementById('res-failed').innerText = scoreFailed;
        }

        document.addEventListener('keydown', (e) => {
            if (!isActive) return;
            if (e.key === 'ArrowUp') flipCard();
            else if (e.key === 'ArrowRight' && isFlipped) { scoreHistory.push('correct'); scoreCorrect++; nextCard(); }
            else if (e.key === 'ArrowLeft' && isFlipped) { scoreHistory.push('failed'); scoreFailed++; nextCard(); }
            else if (e.key === 'ArrowDown' && currentIndex > 0) {
                currentIndex--; 
                const last = scoreHistory.pop();
                if (last === 'correct') scoreCorrect--; if (last === 'failed') scoreFailed--;
                updateHUD(); displayCard(); 
                document.getElementById('word-text').style.visibility = 'visible'; isFlipped = true;
            } else if (e.key === 'Escape') endExercise("Session Aborted");
        });

        initMenu();
    </script>
</body>
</html>
